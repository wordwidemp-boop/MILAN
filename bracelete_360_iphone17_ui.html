<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 17 UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 375px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }
        header {
            background-color: #007aff;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .content {
            padding: 20px;
        }
        footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            background-color: #f0f0f0;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>iPhone 17 UI</h1>
        </header>
        <div class="content">
            <h2>Welcome to the iPhone 17 User Interface</h2>
            <p>This is a simple representation of the iPhone 17 UI system.</p>
            <button>Click Me</button>
        </div>
        <footer>
            <p>&copy; 2026 MyCompany</p>
        </footer>
    </div>
    <script>
        document.querySelector('button').addEventListener('click', function() {
            alert('Button Clicked!');
        });
    </script>
</body>
</html>
