<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Live Camera Dashboard</title>\n    <style>\n        body {\n            background-color: black;\n            color: #00ff00;\n            font-family: Arial, sans-serif;\n            overflow: hidden;\n        }\n        .container {\n            display: grid;\n            grid-template-columns: repeat(3, 1fr);\n            gap: 10px;\n        }\n        iframe {\n            width: 100%;\n            height: 300px;\n            border: none;\n            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);\n        }\n        button {\n            background-color: #00ff00;\n            border: none;\n            padding: 10px;\n            margin-top: 10px;\n            cursor: pointer;\n        }\n        #fullscreen {\n            position: absolute;\n            top: 10px;\n            right: 10px;\n            z-index: 1000;\n        }\n    </style>\n</head>\n<body>\n    <div id="clock"></div>\n    <div id="controls">\n        <button onclick="changeLayout(1)">1 Camera</button>\n        <button onclick="changeLayout(2)">2 Cameras</button>\n        <button onclick="changeLayout(4)">4 Cameras</button>\n        <button onclick="changeLayout(6)">6 Cameras</button>\n        <button onclick="filterSources('youtube')">YouTube</button>\n        <button onclick="filterSources('511NY')">511NY</button>\n    </div>\n    <button id="fullscreen">Toggle Fullscreen</button>\n    <div class="container" id="cameraContainer">\n        <!-- Embedding 6 camera feeds -->\n        <iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID_1" id="camera1"></iframe>\n        <iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID_2" id="camera2"></iframe>\n        <iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID_3" id="camera3"></iframe>\n        <iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID_4" id="camera4"></iframe>\n        <iframe src="https://www.youtube.com/embed/live_stream?channel=CHANNEL_ID_5" id="camera5"></iframe>\n        <iframe src="https://www.511ny.org/511NY/liveCameraFeed?camera=CAMERA_ID_1" id="camera6"></iframe>\n    </div>\n    <script>\n        // Function to show the current time\n        function updateClock() {\n            const now = new Date();\n            const options = {\n                year: 'numeric',\n                month: '2-digit',\n                day: '2-digit',\n                hour: '2-digit',\n                minute: '2-digit',\n                second: '2-digit',\n                hour12: false\n            };\n            document.getElementById('clock').innerHTML = now.toLocaleString('en-CA', options);\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n\n        // Functions to change layout and filter sources\n        function changeLayout(num) {\n            const allCameras = document.querySelectorAll('#cameraContainer iframe');\n            allCameras.forEach((camera, index) => {\n                if (index < num) {\n                    camera.style.display = 'block';\n                } else {\n                    camera.style.display = 'none';\n                }\n            });\n        }\n        function filterSources(source) {\n            const allCameras = document.querySelectorAll('#cameraContainer iframe');\n            allCameras.forEach(camera => {\n                if (camera.src.includes(source)) {\n                    camera.style.display = 'block';\n                } else {\n                    camera.style.display = 'none';\n                }\n            });\n        }\n\n        // Fullscreen toggle functionality\n        document.getElementById('fullscreen').onclick = function () {\n            if (!document.fullscreenElement) {\n                document.documentElement.requestFullscreen();\n            } else {\n                if (document.exitFullscreen) {\n                    document.exitFullscreen();\n                }\n            }\n        };\n    </script>\n</body>\n</html>
