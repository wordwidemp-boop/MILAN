<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yonkers Camera Dashboard</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        .camera-feed {
            position: relative;
            height: 300px;
            background-color: #000;
            border: 2px solid #00ffcc;
        }
        .controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
        }
        button {
            background-color: #00ffcc;
            color: #1a1a1a;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-right: 5px;
        }
        button:hover {
            background-color: #00cc99;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="toggleLayout()">Toggle Layout</button>
        <button onclick="filterFeeds()">Filter Feeds</button>
    </div>
    <div id="grid">
        <div class="camera-feed">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=YOUR_YOUTUBE_CHANNEL_ID" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="camera-feed">
            <iframe src="https://511ny.org/traffic-runner?cameraId=511NEWYORK_CAMERA" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <!-- Add more camera feeds as desired -->
    </div>
    <script>
        function toggleLayout() {
            const grid = document.getElementById('grid');
            if (grid.style.gridTemplateColumns === 'repeat(auto-fill, minmax(300px, 1fr))') {
                grid.style.gridTemplateColumns = '1fr'; // Single column layout
            } else {
                grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(300px, 1fr))';
            }
        }
        
        function filterFeeds() {
            // Implement filter logic as needed
            alert('Filter feature is not yet implemented!');
        }
    </script>
</body>
</html>
